<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Health Input</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<div class="container">

<h1>Health Input Dashboard</h1>

<div class="tabs">
<button id="manualBtn" onclick="showManual()">Manual Input</button>
<button id="wearableBtn" onclick="showWearable()">Wearable Sync</button>
</div>

<!-- Manual Input -->

<div class="card" id="manualForm">

<h2>Enter Health Vitals</h2>

<div class="input-group">
<label>Resting Heart Rate (40 - 120 bpm)</label>
<input type="range" min="40" max="120" value="70" id="hr" oninput="updateValue('hrVal',this.value)">
<span id="hrVal">70</span>
</div>

<div class="input-group">
<label>Sleep Hours (0 - 12 hrs)</label>
<input type="range" min="0" max="12" value="7" id="sleep" oninput="updateValue('sleepVal',this.value)">
<span id="sleepVal">7</span>
</div>

<div class="input-group">
<label>Activity Minutes (0 - 180 mins)</label>
<input type="range" min="0" max="180" value="30" id="activity" oninput="updateValue('actVal',this.value)">
<span id="actVal">30</span>
</div>

<div class="input-group">
<label>SpO2 Level (90 - 100%)</label>
<input type="range" min="90" max="100" value="98" id="spo2" oninput="updateValue('spo2Val',this.value)">
<span id="spo2Val">98</span>
</div>

<button class="submit-btn" onclick="submitVitals()">Submit Vitals</button>

</div>

<!-- Wearable -->

<div class="card" id="wearable" style="display:none">

<h2>Connect Wearable Device</h2>

<p>Sync your smartwatch or fitness band to automatically import health data.</p>

<button class="sync-btn">Sync Device</button>

</div>

</div>

<script src="script.js"></script>

</body>
</html>
