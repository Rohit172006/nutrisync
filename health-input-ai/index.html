<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Health Input</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<div class="container">

<h1>Health Input Dashboard</h1>

<div class="tabs">
<button onclick="showManual()">Manual Input</button>
<button onclick="showWearable()">Wearable Sync</button>
</div>

<div class="card" id="manualForm">

<h2>Enter Health Vitals</h2>

<div class="input-group">
<label>Resting Heart Rate (40 - 120 bpm)</label>
<input type="number" id="hr" placeholder="Enter heart rate">
<small id="hrError" class="error"></small>
</div>

<div class="input-group">
<label>Sleep Hours (0 - 12 hrs)</label>
<input type="number" id="sleep" placeholder="Enter sleep hours">
<small id="sleepError" class="error"></small>
</div>

<div class="input-group">
<label>Activity Minutes (0 - 180 mins)</label>
<input type="number" id="activity" placeholder="Enter activity minutes">
<small id="activityError" class="error"></small>
</div>

<div class="input-group">
<label>SpO2 Level (90 - 100 %)</label>
<input type="number" id="spo2" placeholder="Enter SpO2">
<small id="spo2Error" class="error"></small>
</div>

<button class="submit-btn" onclick="submitVitals()">Submit Vitals</button>

</div>

<div class="card" id="wearable" style="display:none">

<h2>Connect Wearable Device</h2>
<p>Sync smartwatch to import health data.</p>

<button class="sync-btn">Sync Device</button>

</div>

</div>

<script src="script.js"></script>

</body>
</html>
